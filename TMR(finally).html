<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>隧道磁电阻 (TMR) · 自旋相关隧穿 | 单向输运可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0b0e14;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 18px;
    }
    .main-container {
      display: flex;
      flex-wrap: wrap;
      gap: 22px;
      max-width: 1120px;
      width: 100%;
      justify-content: center;
      align-items: flex-start;
    }
    .structure-panel {
      background: #1a1e28;
      border-radius: 16px;
      padding: 16px 14px 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      border: 1px solid #2e3542;
      flex: 1 1 550px;
      min-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .structure-panel h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 0.8rem;
      color: #8f98a8;
      margin-bottom: 8px;
    }
    canvas#structureCanvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 12px;
      background: #0d1117;
      cursor: default;
    }
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex: 0 0 340px;
      min-width: 290px;
    }
    .control-panel, .chart-panel {
      background: #1a1e28;
      border-radius: 16px;
      padding: 18px 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      border: 1px solid #2e3542;
    }
    .control-panel h3, .chart-panel h3 {
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }
    .angle-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .angle-value {
      font-size: 2rem;
      font-weight: 700;
      color: #f0a040;
      font-family: 'JetBrains Mono', monospace;
    }
    input[type="range"] {
      width: 100%;
      height: 10px;
      border-radius: 5px;
      background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
      -webkit-appearance: none;
      outline: none;
      margin: 8px 0 14px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #f0a040;
      cursor: pointer;
      box-shadow: 0 0 18px #f0a040aa;
    }
    .preset-btns {
      display: flex;
      gap: 7px;
      margin-bottom: 14px;
    }
    .preset-btn {
      flex: 1;
      padding: 9px 5px;
      border-radius: 10px;
      background: #212632;
      border: 1.5px solid #333c4d;
      color: #c0c7d4;
      font-weight: 600;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .preset-btn.active {
      border-color: #f0a040;
      background: #2f2718;
      color: #f0a040;
      box-shadow: 0 0 14px rgba(240,160,64,0.4);
    }
    .data-grid {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-top: 6px;
    }
    .data-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
    }
    .data-label {
      color: #8f98a8;
    }
    .data-value {
      font-weight: 700;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
    }
    .highlight {
      color: #f0a040;
      font-size: 0.95rem;
    }
    .resistance-bar {
      height: 12px;
      background: #2a3040;
      border-radius: 6px;
      margin: 12px 0 4px;
      overflow: hidden;
    }
    .resistance-fill {
      height: 100%;
      width: 20%;
      background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
      border-radius: 6px;
      transition: width 0.15s ease;
    }
    canvas#chartCanvas {
      width: 100%;
      height: auto;
      border-radius: 8px;
      background: #0d1117;
    }
    .legend {
      font-size: 0.7rem;
      color: #8f98a8;
      text-align: center;
      margin-top: 4px;
    }
    @media (max-width: 860px) {
      .main-container {
        flex-direction: column;
        align-items: center;
      }
      .structure-panel {
        min-width: auto;
        width: 100%;
      }
      .right-panel {
        width: 100%;
        max-width: 480px;
      }
    }
  </style>
</head>
<body>
<div class="main-container">
  <!-- 左侧结构图：TMR 三层结构 + 动态粒子 -->
  <div class="structure-panel">
    <h3>🧲 隧道磁电阻 (TMR) · 自旋相关隧穿</h3>
    <p class="subtitle">电子从钉扎层 → 绝缘层 → 自由层 | 概率隧穿模拟</p>
    <canvas id="structureCanvas" width="540" height="480" aria-label="TMR结构示意图"></canvas>
  </div>

  <!-- 右侧控制及数据显示 -->
  <div class="right-panel">
    <div class="control-panel">
      <h3>🎛️ 自由层磁化方向 (可拖动箭头)</h3>
      <div class="angle-row">
        <span style="color:#8f98a8;">夹角 θ =</span>
        <span class="angle-value" id="angleDisplay">0°</span>
      </div>
      <input type="range" id="angleSlider" min="0" max="360" value="0" step="0.5">
      <div class="preset-btns">
        <button class="preset-btn active" data-angle="0">∥ 平行 0°</button>
        <button class="preset-btn" data-angle="90">⟂ 垂直 90°</button>
        <button class="preset-btn" data-angle="180">↑↓ 反平行 180°</button>
        <button class="preset-btn" data-angle="270">⟂ 270°</button>
      </div>
      <div class="data-grid">
        <div class="data-row"><span class="data-label">📐 当前角度</span><span class="data-value" id="dataAngle">0.0°</span></div>
        <div class="data-row"><span class="data-label">⚡ 电阻 R(θ)</span><span class="data-value highlight" id="dataResistance">50.0 Ω</span></div>
        <div class="data-row"><span class="data-label">🔋 隧穿电流 (V=1V)</span><span class="data-value" id="dataCurrent">20.00 mA</span></div>
        <div class="data-row"><span class="data-label">📊 TMR 比值</span><span class="data-value" id="dataTMR">0.0%</span></div>
      </div>
      <div class="resistance-bar">
        <div class="resistance-fill" id="resistanceBar" style="width:8%;"></div>
      </div>
      <p style="font-size:0.7rem; color:#8f98a8; margin-top:2px;">低阻(绿) ⇄ 高阻(红) | 平行态 ↑ 隧穿占比高，↓ 少量; 反平行态两者均低</p>
    </div>

    <div class="chart-panel">
      <h3>📈 电阻-角度关系 R(θ)</h3>
      <canvas id="chartCanvas" width="340" height="200"></canvas>
      <p class="legend">Julliere模型 · 🔴 当前工作点 | 高TMR (900%)</p>
    </div>
  </div>
</div>

<script>
  (function() {
    // ========== 物理参数: 高TMR = 900% ==========
    const R_P = 50;            // 平行电阻 50 Ω
    const TMR_RATIO = 9.0;     // TMR = 900% → R_AP = 500 Ω
    const R_AP = R_P * (1 + TMR_RATIO);
    const G_P = 1 / R_P;
    const G_AP = 1 / R_AP;

    // 标准 Julliere 电导模型 (保持电阻曲线与 TMR 值严格一致，用于界面数据)
    function getConductance(thetaDeg) {
      const half = (thetaDeg * Math.PI / 180) / 2;
      const cosH = Math.cos(half);
      const sinH = Math.sin(half);
      return G_P * cosH * cosH + G_AP * sinH * sinH;
    }
    function getResistance(thetaDeg) {
      return 1 / getConductance(thetaDeg);
    }

    // ========== 优化粒子隧穿概率模型 (满足需求2 & 3) ==========
    // 平行态(0°) : 自旋向上隧穿概率高 (↑↑ 通道导通性强) , 自旋向下存在少量隧穿(缺陷/界面粗糙/自旋翻转)
    // 反平行态(180°): 两种自旋隧穿概率都比较小且数量级相近 (↑↓ 和 ↓↑通道都受抑制)
    // 中间角度使用 cos²(θ/2) 因子平滑过渡
    const P_UP_PARALLEL = 0.94;      // 平行时 ↑ 隧穿概率很高 (体现大量电子穿过)
    const P_DOWN_PARALLEL = 0.07;    // 平行时 ↓ 仍有少量电子能够隧穿 (满足自旋向下少量)
    const P_UP_ANTIPARALLEL = 0.09;   // 反平行时 ↑ 隧穿概率较低 (~9%)
    const P_DOWN_ANTIPARALLEL = 0.09; // 反平行时 ↓ 隧穿概率较低 (~9%) 两者均较少，且数量相当

    // 根据角度计算自旋向上隧穿概率
    function probUp(thetaDeg) {
      const halfRad = (thetaDeg * Math.PI / 180) / 2;
      const factor = Math.cos(halfRad) ** 2;   // 0° -> 1 , 180° -> 0
      // 线性插值：平行态高隧穿 -> 反平行态低隧穿
      let p = P_UP_PARALLEL * factor + P_UP_ANTIPARALLEL * (1 - factor);
      // 保持概率边界整洁
      return Math.min(0.99, Math.max(0.02, p));
    }

    // 根据角度计算自旋向下隧穿概率
    function probDown(thetaDeg) {
      const halfRad = (thetaDeg * Math.PI / 180) / 2;
      const factor = Math.cos(halfRad) ** 2;
      // 平行态有少量隧穿，反平行态也存在较少隧穿（两者数量级接近，都少）
      let p = P_DOWN_PARALLEL * factor + P_DOWN_ANTIPARALLEL * (1 - factor);
      return Math.min(0.99, Math.max(0.02, p));
    }

    // ==================== DOM 元素绑定 ====================
    const structureCanvas = document.getElementById('structureCanvas');
    const structureCtx = structureCanvas.getContext('2d');
    const chartCanvas = document.getElementById('chartCanvas');
    const chartCtx = chartCanvas.getContext('2d');
    const angleSlider = document.getElementById('angleSlider');
    const angleDisplay = document.getElementById('angleDisplay');
    const dataAngle = document.getElementById('dataAngle');
    const dataResistance = document.getElementById('dataResistance');
    const dataCurrent = document.getElementById('dataCurrent');
    const dataTMR = document.getElementById('dataTMR');
    const resistanceBar = document.getElementById('resistanceBar');
    const presetButtons = document.querySelectorAll('.preset-btn');

    let currentAngleDeg = 0;   // 当前自由层磁矩角度

    // ==================== 结构图几何常量 (无电场标注) ====================
    const structW = 540, structH = 480;
    const marginX = 55;
    const layerWidth = structW - 2 * marginX;
    const centerX = structW / 2;

    // 三层坐标
    const freeY = 50, freeH = 130;
    const barrierY = freeY + freeH, barrierH = 32;
    const pinnedY = barrierY + barrierH, pinnedH = 130;

    // 磁化箭头绘制位置 (自由层箭头可交互，钉扎层固定)
    const freeArrowX = marginX + 60;
    const freeArrowY = freeY + freeH/2;
    const pinnedArrowX = marginX + layerWidth - 60;
    const pinnedArrowY = pinnedY + pinnedH/2;
    const arrowLength = 68;
    const arrowHead = 17;

    // 文字标注位置
    const freeLabelX = marginX + layerWidth - 70;
    const freeLabelY = freeY + freeH/2 + 6;
    const pinnedLabelX = marginX + 75;
    const pinnedLabelY = pinnedY + pinnedH/2 + 6;

    // ==================== 粒子系统 (从钉扎层向自由层定向输运) ====================
    const particles = [];
    const MAX_PARTICLES = 44;
    const SPAWN_INTERVAL_BASE = 42; // ms

    class SpinElectron {
      constructor() {
        this.reset();
      }
      reset() {
        // 起始位置: 钉扎层内部，随机生成便于视觉丰富
        this.x = marginX + 12 + Math.random() * (layerWidth - 24);
        this.y = pinnedY + 12 + Math.random() * (pinnedH - 24);
        this.vy = -0.9 - Math.random() * 0.7;    // 主要向上运动
        this.vx = (Math.random() - 0.5) * 0.45;
        // 自旋向上/向下各半，均匀分布
        this.spin = Math.random() < 0.5 ? 'up' : 'down';
        this.state = 'rising';   // rising, tunneling, reflected, passed, dead
        this.opacity = 0.95;
        this.life = 0;
        this.maxLife = 260 + Math.random() * 120;
        this.decided = false;    // 是否已经做出隧穿/反射决定
      }

      update(thetaDeg) {
        this.life++;
        if (this.life > this.maxLife || this.opacity <= 0.03) {
          this.state = 'dead';
          return;
        }

        // 抵达势垒区域时 (到达绝缘层附近) 决定隧穿或反射
        if (this.state === 'rising' && this.y <= barrierY + barrierH + 4 && this.y >= barrierY - 2 && !this.decided) {
          this.decided = true;
          const pUp = probUp(thetaDeg);
          const pDown = probDown(thetaDeg);
          const probability = this.spin === 'up' ? pUp : pDown;
          if (Math.random() < probability) {
            // 隧穿成功，继续向上进入自由层区域
            this.state = 'tunneling';
            this.vy = -1.0 - Math.random() * 0.65;
            this.vx += (Math.random() - 0.5) * 0.7;
          } else {
            // 反射回钉扎层底部，最终消失
            this.state = 'reflected';
            this.vy = 0.6 + Math.random() * 0.8;
            this.opacity = 0.75;
            this.vx += (Math.random() - 0.5) * 1.0;
          }
        }

        // 根据状态更新运动
        if (this.state === 'rising') {
          // 未到达势垒前加入微小无序, 电阻越大热运动越明显
          const resistRatio = (getResistance(thetaDeg) - R_P) / (R_AP - R_P);
          const jitter = 0.18 + resistRatio * 0.85;
          this.vx += (Math.random() - 0.5) * jitter * 0.45;
          this.vx *= 0.94;
        } else if (this.state === 'tunneling') {
          // 成功隧穿后，若超出自由层顶部则标记为穿过
          if (this.y < freeY - 12) {
            this.state = 'passed';
          }
        } else if (this.state === 'reflected') {
          // 反射粒子向下运动，超出钉扎层底部后消亡
          if (this.y > pinnedY + pinnedH + 28) {
            this.state = 'dead';
          }
          this.opacity -= 0.008;
        } else if (this.state === 'passed') {
          // 穿过自由层后逐渐淡出
          this.opacity -= 0.02;
          if (this.opacity <= 0.08) this.state = 'dead';
        }

        this.x += this.vx;
        this.y += this.vy;
        // 边界限制防止飞出画布过远
        this.x = Math.max(marginX - 25, Math.min(marginX + layerWidth + 25, this.x));
      }

      isAlive() { return this.state !== 'dead'; }
    }

    // 粒子生成速率与电阻成反比 (高阻生成慢，低阻生成快) 增强电流视觉对比
    let lastSpawnTimeMs = 0;
    function trySpawnParticle(nowMs, currentResistance) {
      // 清理死亡粒子
      for (let i = particles.length - 1; i >= 0; i--) {
        if (!particles[i].isAlive()) particles.splice(i, 1);
      }
      if (particles.length >= MAX_PARTICLES) return;
      // 动态间隔: 低阻(平行)生成快，高阻(反平行)生成慢
      const resistNorm = (currentResistance - R_P) / (R_AP - R_P); // 0~1
      const interval = SPAWN_INTERVAL_BASE * (0.55 + resistNorm * 0.9); // 平行~23ms, 反平行~72ms
      if (!lastSpawnTimeMs || (nowMs - lastSpawnTimeMs) >= interval) {
        lastSpawnTimeMs = nowMs;
        particles.push(new SpinElectron());
      }
    }

    // ==================== 结构绘制 (无电场方向标注) ====================
    function drawStructure(thetaDeg) {
      const ctx = structureCtx;
      ctx.clearRect(0, 0, structW, structH);
      ctx.fillStyle = '#0b0e15';
      ctx.fillRect(0, 0, structW, structH);

      // 辅助绘制多层圆角矩形
      function drawLayer(x, y, w, h, baseColor, lightColor, label, fontSize = 17, fontWeight = '700') {
        const grad = ctx.createLinearGradient(x, y, x, y + h);
        grad.addColorStop(0, lightColor);
        grad.addColorStop(0.45, baseColor);
        grad.addColorStop(1, shadeColor(baseColor, -32));
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, 10);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.beginPath();
        ctx.roundRect(x, y, w, h * 0.3, [10, 10, 0, 0]);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, 10);
        ctx.stroke();
        if (label) {
          ctx.fillStyle = '#ffffff';
          ctx.font = `${fontWeight} ${fontSize}px "PingFang SC","Microsoft YaHei","Segoe UI",sans-serif`;
          ctx.textAlign = 'center';
          ctx.fillText(label, x + w/2, y + h/2 + fontSize/3);
        }
      }
      function shadeColor(hex, percent) {
        if (!hex.startsWith('#')) return hex;
        let R = parseInt(hex.slice(1,3),16);
        let G = parseInt(hex.slice(3,5),16);
        let B = parseInt(hex.slice(5,7),16);
        const amt = Math.round(2.55 * percent);
        R = Math.min(255, Math.max(0, R + amt));
        G = Math.min(255, Math.max(0, G + amt));
        B = Math.min(255, Math.max(0, B + amt));
        return `rgb(${R},${G},${B})`;
      }

      // 自由层 (浅蓝)
      drawLayer(marginX, freeY, layerWidth, freeH, '#5BA4CF', '#7EC8F2', '自由层', 19, '700');
      // 绝缘隧穿层 (蓝紫调)
      drawLayer(marginX, barrierY, layerWidth, barrierH, '#1F5A98', '#3A7CC3', '绝缘隧穿势垒', 15, '700');
      // 钉扎层 (深蓝)
      drawLayer(marginX, pinnedY, layerWidth, pinnedH, '#0C2D52', '#1A4775', '钉扎层 (参考层)', 18, '700');

      // 绘制所有运动粒子 (隧穿电子动态)
      for (const p of particles) {
        if (!p.isAlive()) continue;
        const isUp = p.spin === 'up';
        const color = isUp ? '#FF9500' : '#00B4D8'; // 橙(↑) 青(↓)
        ctx.save();
        if (p.state === 'tunneling') {
          ctx.shadowColor = 'rgba(255,240,140,0.9)';
          ctx.shadowBlur = 12;
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, 6.0, 0, 2*Math.PI);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.6;
        ctx.stroke();
        ctx.fillStyle = '#000000';
        ctx.font = 'bold 9px "PingFang SC"';
        ctx.textAlign = 'center';
        ctx.fillText('e⁻', p.x, p.y + 3.5);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 12px "Segoe UI"';
        ctx.fillText(isUp ? '↑' : '↓', p.x, p.y - 12);
        ctx.restore();
      }

      // 绘制磁化方向箭头
      function drawArrow(cx, cy, angleRad, color, glowColor, lw = 5.2) {
        const endX = cx + arrowLength * Math.cos(angleRad);
        const endY = cy + arrowLength * Math.sin(angleRad);
        const startX = cx - arrowLength * 0.28 * Math.cos(angleRad);
        const startY = cy - arrowLength * 0.28 * Math.sin(angleRad);
        ctx.save();
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = 12;
        ctx.strokeStyle = color;
        ctx.lineWidth = lw;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.restore();
        const a1 = angleRad + Math.PI * 0.72;
        const a2 = angleRad - Math.PI * 0.72;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(endX, endY);
        ctx.lineTo(endX + arrowHead * Math.cos(a1), endY + arrowHead * Math.sin(a1));
        ctx.lineTo(endX + arrowHead * Math.cos(a2), endY + arrowHead * Math.sin(a2));
        ctx.closePath();
        ctx.fill();
      }

      const freeRad = currentAngleDeg * Math.PI / 180;
      drawArrow(freeArrowX, freeArrowY, freeRad, '#FFD966', 'rgba(255,200,70,0.75)');
      drawArrow(pinnedArrowX, pinnedArrowY, 0, '#B8CCF0', 'rgba(180,200,255,0.7)');

      // 文字注释 (错位避免遮挡箭头)
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 15px "PingFang SC","Microsoft YaHei"';
      ctx.textAlign = 'center';
      ctx.fillText('自由层磁矩 ↕️', freeLabelX, freeLabelY);
      ctx.fillText('参考层磁矩 🔒', pinnedLabelX, pinnedLabelY);

      // 绘制角度指示弧线 (非零角度)
      if (Math.abs(currentAngleDeg) > 1.5 && Math.abs(currentAngleDeg - 360) > 1.5) {
        ctx.strokeStyle = 'rgba(255,200,100,0.65)';
        ctx.lineWidth = 2.2;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.arc(freeArrowX, freeArrowY, 36, 0, freeRad, freeRad < 0);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#FFD966';
        ctx.font = 'italic 14px "PingFang SC"';
        ctx.fillText('θ', freeArrowX + 42 * Math.cos(freeRad/2), freeArrowY + 42 * Math.sin(freeRad/2));
      }
    }

    // 绘制 R-θ 特性曲线 (Julliere模型, 高TMR)
    function drawChart(thetaDeg) {
      const ctx = chartCtx;
      const w = chartCanvas.width, h = chartCanvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, w, h);
      const padL = 46, padR = 20, padT = 18, padB = 32;
      const plotW = w - padL - padR, plotH = h - padT - padB;
      const rMin = R_P * 0.8, rMax = R_AP * 1.12;
      function toX(th) { return padL + (th / 360) * plotW; }
      function toY(r) { return padT + plotH - ((r - rMin) / (rMax - rMin)) * plotH; }

      // 网格
      ctx.strokeStyle = 'rgba(255,255,255,0.07)';
      ctx.lineWidth = 1;
      for (let th = 0; th <= 360; th += 90) { let gx = toX(th); ctx.beginPath(); ctx.moveTo(gx, padT); ctx.lineTo(gx, padT + plotH); ctx.stroke(); }
      for (let r of [R_P, (R_P + R_AP) / 2, R_AP]) { let gy = toY(r); ctx.beginPath(); ctx.moveTo(padL, gy); ctx.lineTo(padL + plotW, gy); ctx.stroke(); }

      // 绘制电阻曲线
      ctx.beginPath();
      ctx.strokeStyle = '#5DADE2';
      ctx.lineWidth = 3;
      for (let t = 0; t <= 360; t += 0.8) {
        const rVal = getResistance(t);
        const sx = toX(t), sy = toY(rVal);
        if (t === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
      }
      ctx.stroke();

      const currentR = getResistance(thetaDeg);
      const ptX = toX(thetaDeg % 360), ptY = toY(currentR);
      ctx.fillStyle = '#E74C3C';
      ctx.shadowColor = '#E74C3C';
      ctx.shadowBlur = 11;
      ctx.beginPath(); ctx.arc(ptX, ptY, 7.6, 0, 2 * Math.PI); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.4; ctx.stroke();

      ctx.fillStyle = '#9aa2b5';
      ctx.font = '11px "PingFang SC"';
      ctx.textAlign = 'center';
      ctx.fillText('0°', padL, h - 4);
      ctx.fillText('90°', toX(90), h - 4);
      ctx.fillText('180°', toX(180), h - 4);
      ctx.fillText('270°', toX(270), h - 4);
      ctx.fillText('360°', toX(360), h - 4);
      ctx.textAlign = 'right';
      ctx.fillText(`${R_P} Ω`, padL - 6, toY(R_P) + 4);
      ctx.fillText(`${R_AP} Ω`, padL - 6, toY(R_AP) + 4);
    }

    // ========== UI 数值更新与滑块同步 ==========
    function updateUI(thetaDeg) {
      const normAngle = ((thetaDeg % 360) + 360) % 360;
      const R = getResistance(normAngle);
      const I = 1 / R;
      const tmr = (R - R_P) / R_P * 100;
      angleDisplay.textContent = normAngle.toFixed(1) + '°';
      dataAngle.textContent = normAngle.toFixed(1) + '°';
      dataResistance.textContent = R.toFixed(1) + ' Ω';
      dataCurrent.textContent = (I * 1000).toFixed(2) + ' mA';
      dataTMR.textContent = tmr.toFixed(1) + '%';
      const barFrac = (R - R_P) / (R_AP - R_P);
      resistanceBar.style.width = (Math.min(1, Math.max(0, barFrac)) * 100).toFixed(1) + '%';
      if (Math.abs(parseFloat(angleSlider.value) - normAngle) > 0.6) {
        angleSlider.value = normAngle;
      }
      presetButtons.forEach(btn => {
        const target = parseFloat(btn.dataset.angle);
        if (Math.abs(normAngle - target) < 1.2 || (target === 0 && normAngle > 358.5)) btn.classList.add('active');
        else btn.classList.remove('active');
      });
    }

    function setAngle(deg) {
      let newAngle = ((deg % 360) + 360) % 360;
      currentAngleDeg = newAngle;
      updateUI(currentAngleDeg);
    }

    // ========== 动画主循环 (粒子系统+绘制) ==========
    let animFrameRequest = null;
    let lastFrameTimestamp = 0;
    function animationLoop(now) {
      const currentRes = getResistance(currentAngleDeg);
      trySpawnParticle(now, currentRes);
      for (let p of particles) if (p.isAlive()) p.update(currentAngleDeg);
      drawStructure(currentAngleDeg);
      drawChart(currentAngleDeg);
      requestAnimationFrame(animationLoop);
    }

    // ========== 交互事件 (滑块，预设，拖拽箭头，键盘) ==========
    function animateToAngle(target) {
      const start = currentAngleDeg;
      let delta = ((target % 360) + 360) % 360 - ((start % 360) + 360) % 360;
      if (delta > 180) delta -= 360;
      if (delta < -180) delta += 360;
      const duration = 350, startTime = performance.now();
      function step(ts) {
        const progress = Math.min(1, (ts - startTime) / duration);
        setAngle(start + delta * (1 - Math.pow(1 - progress, 3)));
        if (progress < 1) requestAnimationFrame(step);
        else setAngle(target);
      }
      requestAnimationFrame(step);
    }

    angleSlider.addEventListener('input', () => setAngle(parseFloat(angleSlider.value)));
    presetButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const targetAngle = parseFloat(btn.dataset.angle);
        animateToAngle(targetAngle);
      });
    });

    // 拖拽自由层箭头改变角度
    let dragActive = false;
    function getCanvasCoords(e) {
      const rect = structureCanvas.getBoundingClientRect();
      let clientX, clientY;
      if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
      else { clientX = e.clientX; clientY = e.clientY; }
      return { x: (clientX - rect.left) * (structW / rect.width), y: (clientY - rect.top) * (structH / rect.height) };
    }
    function isNearArrow(pos) {
      const dx = pos.x - freeArrowX, dy = pos.y - freeArrowY;
      return Math.hypot(dx, dy) < 48;
    }
    structureCanvas.addEventListener('mousedown', (e) => {
      const pos = getCanvasCoords(e);
      if (isNearArrow(pos)) { dragActive = true; structureCanvas.style.cursor = 'grabbing'; e.preventDefault(); }
    });
    window.addEventListener('mousemove', (e) => {
      if (!dragActive) { structureCanvas.style.cursor = isNearArrow(getCanvasCoords(e)) ? 'grab' : 'default'; return; }
      const pos = getCanvasCoords(e);
      let angle = Math.atan2(pos.y - freeArrowY, pos.x - freeArrowX) * 180 / Math.PI;
      setAngle(angle);
    });
    window.addEventListener('mouseup', () => { dragActive = false; structureCanvas.style.cursor = 'default'; });
    structureCanvas.addEventListener('touchstart', (e) => {
      const pos = getCanvasCoords(e);
      if (isNearArrow(pos)) { dragActive = true; e.preventDefault(); }
    }, { passive: false });
    window.addEventListener('touchmove', (e) => {
      if (!dragActive) return;
      const pos = getCanvasCoords(e);
      let angle = Math.atan2(pos.y - freeArrowY, pos.x - freeArrowX) * 180 / Math.PI;
      setAngle(angle);
      e.preventDefault();
    });
    window.addEventListener('touchend', () => { dragActive = false; });
    window.addEventListener('keydown', (e) => {
      const step = e.shiftKey ? 15 : 5;
      if (e.key === 'ArrowRight' || e.key === 'ArrowUp') { e.preventDefault(); setAngle(currentAngleDeg + step); }
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') { e.preventDefault(); setAngle(currentAngleDeg - step); }
      else if (e.key === 'p' || e.key === 'P') { e.preventDefault(); animateToAngle(0); }
      else if (e.key === 'a' || e.key === 'A') { e.preventDefault(); animateToAngle(180); }
      else if (e.key === 'v' || e.key === 'V') { e.preventDefault(); animateToAngle(90); }
    });

    // 初始化粒子
    for (let i = 0; i < 18; i++) particles.push(new SpinElectron());
    setAngle(0);
    requestAnimationFrame(animationLoop);
  })();
</script>
</body>
